# Deploy static HTML portfolio to GitHub Pages (no Jekyll build)
name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Pages allows only one deployment in flight. If a prior deploy is still
      # settling, the API returns a transient failure — wait and retry once.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true

      - name: Wait for in-flight deployment to settle
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Fail if both deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: exit 1
