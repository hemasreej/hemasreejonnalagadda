<section id="contact" class="contact-section">
  <div class="contact-container">

    <h2 class="section-title">Get in Touch</h2>
    <p class="contact-intro">
      I’m always open to discussing new projects, collaborations, or research ideas.
      Let’s connect — whether it’s for firmware development, embedded systems,
      or hardware-software integration.
    </p>

    <div class="contact-content">
      <!-- Left side -->
      <div class="contact-info">
        <h3>Contact Information</h3>
        <p><strong>Email:</strong> <a href="mailto:hemasreejonnalagadda@gmail.com">hemasreejonnalagadda@gmail.com</a></p>
        <p><strong>Location:</strong> Hyderabad, India</p>
        <div class="contact-socials">
          <a href="https://www.linkedin.com/in/hemasree-j-256387212/" target="_blank">🔗</a>
          <a href="https://github.com/hemasreej" target="_blank">💻</a>
          <a href="https://www.youtube.com/@hemasreejonnalagadda09" target="_blank">📹</a>
        </div>
      </div>

      <!-- Right side -->
      <form id="contact-form" class="contact-form" action="https://formsubmit.co/hemasreejonnalagadda@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_subject" value="New message from Portfolio">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>
        </div>

        <button type="submit" class="btn gold-btn">📨 Send Message</button>
        <p id="form-status" class="form-status"></p>
      </form>
    </div>
  </div>
</section>
